#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "aeterna"
name = "Aeterna"

description.en = "Self-hosted dead man's switch: write messages, check in regularly, deliver if you stop."
description.fr = "Système d'homme mort auto-hébergé : écrivez des messages, validez régulièrement, livraison si vous cessez."

version = "1.5.0~ynh1"

maintainers = ["is@svrgn.me"]

[upstream]
license = "GPL-3.0-or-later"
website = "https://github.com/alpyxn/aeterna"
demo = ""
admindoc = "https://github.com/alpyxn/aeterna#readme"
userdoc = "https://github.com/alpyxn/aeterna#readme"
code = "https://github.com/alpyxn/aeterna"
cpe = ""

[integration]
yunohost = ">= 12.1.17"
helpers_version = "2.1"
# Backend uses CGO (go-sqlite3) so we cross-compile for the host arch.
# armhf is excluded because Go 1.24 dropped 32-bit ARM toolchain mirrors
# for the linux-armv6l tarball series we'd need.
architectures = ["amd64", "arm64"]
multi_instance = true
# Aeterna has its own master-password auth scheme; it does not integrate
# with the YunoHost LDAP / SSO portal at the application level.
ldap = false
sso = false
disk = "300M"
ram.build = "1024M"
ram.runtime = "256M"

[install]

    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/aeterna"

    [install.init_main_permission]
    type = "group"
    default = "visitors"
    help.en = "Who can reach the Aeterna web app at the YunoHost layer. The default 'visitors' leaves the URL open to anyone — required for the dead man's switch flow, since recipients without a YunoHost account need to load delivery links from email. Aeterna's own master-password authentication still protects all management actions (creating, editing, deleting switches and webhooks). Pick 'all_users' if you only ever access Aeterna from YunoHost-account devices and accept that recipients without a YunoHost account will be blocked at the SSO layer."
    help.fr = "Qui peut accéder à l'application web Aeterna au niveau YunoHost. Le défaut 'visitors' laisse l'URL ouverte à tout le monde — nécessaire pour le flux d'homme mort, puisque les destinataires sans compte YunoHost doivent pouvoir charger les liens de livraison reçus par email. L'authentification par mot de passe maître propre à Aeterna protège toujours les actions de gestion. Choisissez 'all_users' uniquement si vous n'accédez à Aeterna que depuis des appareils avec un compte YunoHost et acceptez que les destinataires sans compte YunoHost soient bloqués au niveau SSO."

    [install.admin]
    type = "user"
    help.en = "YunoHost user recorded as the package admin contact. Aeterna's own admin (master password) is set up via the web UI on first launch, independently of this choice."
    help.fr = "Utilisateur YunoHost enregistré comme contact administrateur du paquet. L'admin propre à Aeterna (mot de passe maître) est configuré via l'interface web au premier lancement."

[resources]

    [resources.sources]

        [resources.sources.main]
        url = "https://github.com/alpyxn/aeterna/archive/refs/tags/v1.5.0.tar.gz"
        sha256 = "7e0116ddd6a3f7e38161941e6b67c9e4d7327d37824267b26cf003e77908a7f8"
        autoupdate.strategy = "latest_github_release"
        autoupdate.upstream = "https://github.com/alpyxn/aeterna"

    [resources.system_user]
    # Creates the `aeterna` system user. The user owns $install_dir (built
    # backend + frontend assets) and $data_dir (SQLite DB, attachments,
    # encryption key) and runs the systemd-managed Go backend.

    [resources.install_dir]
    # Default: /var/www/aeterna — built Go binary at backend/aeterna and
    # built React assets at frontend/dist/. Wiped on `--full_replace`
    # upgrades; the .env file is regenerated by ynh_config_add.

    [resources.data_dir]
    # Default: /home/yunohost.app/aeterna — holds:
    #   - aeterna.db          (SQLite database)
    #   - uploads/            (encrypted file attachments)
    #   - secrets/encryption_key  (AES-256 key, 0600)
    # Survives reinstall by default; included in YunoHost backups.

    [resources.ports]

        [resources.ports.main]
        # The Aeterna backend hardcodes :3000 in cmd/server/main.go and does
        # not honour any PORT/SERVER_PORT env var. We declare the resource
        # so YunoHost reserves the port and so $port is exposed to scripts;
        # the install script validates $port == 3000 and aborts otherwise
        # rather than silently routing nginx to a port nothing listens on.
        default = 3000
        exposed = false

    [resources.apt]
    packages = [
        "git",
        "ca-certificates",
        "build-essential",
        "openssl",
    ]

    [resources.go]
    # Resource provisioner installs Go via goenv before scripts/install runs.
    # `goenv-latest --print "1.24"` resolves to the highest 1.24.x release
    # (currently 1.24.12+), satisfying upstream's `go 1.24.12` directive in
    # backend/go.mod. Bump in lockstep with upstream.
    version = "1.24"

    [resources.nodejs]
    # Resource provisioner installs Node via 'n' before scripts/install runs.
    # "20" resolves to the latest 20.x LTS, which satisfies Vite 7
    # (>= 20.19) and Tailwind 4 (>= 20).
    version = "20"

    [resources.permissions]

        [resources.permissions.main]
        url = "/"
        # `allowed` is set by [install.init_main_permission] above (default
        # 'visitors'). Aeterna runs its own master-password auth on top of
        # this — the YunoHost permission only controls who can REACH the
        # vhost at all. Leaving it 'visitors' is required so recipients
        # without a YunoHost account can load delivery links from email.
        show_tile = true
        auth_header = false
