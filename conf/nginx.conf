#sub_path_only rewrite ^__PATH__$ __PATH__/ permanent;

# /api/* — proxy JSON/multipart calls to the Go backend on 127.0.0.1:__PORT__.
# Declared BEFORE the static-frontend block so it wins the longest-prefix
# match for any request under /api.
location __PATH__/api/ {
    proxy_pass         http://127.0.0.1:__PORT__/api/;
    proxy_http_version 1.1;

    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # WebSocket / SSE friendly (harmless if upstream never upgrades).
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";

    proxy_redirect     off;
    proxy_buffering    off;
    proxy_read_timeout 120s;

    # v1.5.0 caps individual files at 12 MiB and total per-message at 25 MiB
    # (see backend/internal/services/validation.go). 30 MiB leaves headroom
    # for multipart overhead.
    client_max_body_size 30M;
}

# Static frontend (Vite build output). React Router does client-side routing
# inside index.html, so any unknown path under __PATH__/ falls back to it.
#
# We use root + rewrite (not alias) for two reasons:
# (1) try_files inside an `alias` location has a long-standing nginx quirk
#     where existing files don't pass the existence check, so every JS/CSS
#     request falls through to the SPA fallback and returns text/html.
# (2) The cleaner workaround would be a named-location fallback with its
#     own alias — but nginx forbids `alias` inside a named location
#     ("alias directive cannot be used inside the named location").
#
# Instead: strip the YunoHost subpath via rewrite, then `root` serves
# files out of frontend/dist/ as if the app were mounted at /.
location __PATH__/ {
    rewrite ^__PATH__/(.*)$ /$1 break;
    root __INSTALL_DIR__/frontend/dist;
    index index.html;
    try_files $uri $uri/ /index.html;

    # YunoHost user portal injection (SSO panel link, language switcher).
    include conf.d/yunohost_panel.conf.inc;
}
