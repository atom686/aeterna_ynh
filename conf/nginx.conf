#sub_path_only rewrite ^__PATH__$ __PATH__/ permanent;

# /api/* — proxy JSON/multipart calls to the Go backend on 127.0.0.1:__PORT__.
# Declared BEFORE the static-frontend block so it wins the longest-prefix
# match for any request under /api.
location __PATH__/api/ {
    proxy_pass         http://127.0.0.1:__PORT__/api/;
    proxy_http_version 1.1;

    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # WebSocket / SSE friendly (harmless if upstream never upgrades).
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";

    proxy_redirect     off;
    proxy_buffering    off;
    proxy_read_timeout 120s;

    # v1.5.0 caps individual files at 12 MiB and total per-message at 25 MiB
    # (see backend/internal/services/validation.go). 30 MiB leaves headroom
    # for multipart overhead.
    client_max_body_size 30M;
}

# Static frontend (Vite build output). React Router does client-side routing
# inside index.html, so any unknown path under __PATH__/ falls back to it.
#
# The constraints we're juggling:
#  - YunoHost's SSO needs the URI to keep the __PATH__ prefix; rewriting
#    it away breaks permission lookup and bounces every asset to the SSO
#    login portal.
#  - `try_files $uri ... __PATH__/index.html` inside an `alias` location
#    has a long-standing nginx quirk: existing files fail the existence
#    check, so every JS/CSS request falls through to index.html and the
#    page renders blank.
#  - `alias` is forbidden inside a named (@) location, so the obvious
#    "named-location SPA fallback" pattern is also off the table.
#
# Solution: use `alias` directly with no try_files. nginx natively serves
# files that exist and 404s files that don't. error_page intercepts the
# 404 and internally rewrites to __PATH__/index.html, which matches this
# same location, hits the alias, and serves dist/index.html. URI keeps
# the YunoHost prefix throughout, so SSO permission lookup is happy.
location __PATH__/ {
    alias __INSTALL_DIR__/frontend/dist/;
    index index.html;
    error_page 404 = @__APP___fallback;

    # YunoHost user portal injection (SSO panel link, language switcher).
    include conf.d/yunohost_panel.conf.inc;
}

# SPA fallback — any path under __PATH__/ that didn't resolve to a file
# above gets index.html so React Router can take over client-side.
# We can't use `alias` inside a named location, so we just rewrite to
# the index.html URL and let it flow back through the prefix location.
location @__APP___fallback {
    rewrite ^ __PATH__/index.html last;
}
