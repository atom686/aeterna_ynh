#sub_path_only rewrite ^__PATH__$ __PATH__/ permanent;

# /api/* — proxy JSON/multipart calls to the Go backend on 127.0.0.1:__PORT__.
# Declared BEFORE the static-frontend block so it wins the longest-prefix
# match for any request under /api.
location __PATH__/api/ {
    proxy_pass         http://127.0.0.1:__PORT__/api/;
    proxy_http_version 1.1;

    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # WebSocket / SSE friendly (harmless if upstream never upgrades).
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";

    proxy_redirect     off;
    proxy_buffering    off;
    proxy_read_timeout 120s;

    # v1.5.0 caps individual files at 12 MiB and total per-message at 25 MiB
    # (see backend/internal/services/validation.go). 30 MiB leaves headroom
    # for multipart overhead.
    client_max_body_size 30M;
}

# Static frontend (Vite build output). React Router does client-side routing
# inside index.html, so any unknown path under __PATH__/ falls back to it.
#
# Why a named-location fallback (@__APP___spa) instead of inline try_files:
# the combination `try_files $uri ... __PATH__/index.html` inside a
# location that uses `alias` is unreliable on Debian's nginx — for an
# existing JS file at __INSTALL_DIR__/frontend/dist/assets/foo.js,
# `$uri = __PATH__/assets/foo.js` fails the existence check and nginx
# falls through to the index.html fallback, returning text/html for
# every .js / .css request and rendering a blank page in the browser.
# Decoupling the fallback into a named location keeps the alias-based
# direct file serving on the happy path.
location __PATH__/ {
    alias __INSTALL_DIR__/frontend/dist/;
    index index.html;
    try_files $uri $uri/ @__APP___spa;

    # YunoHost user portal injection (SSO panel link, language switcher).
    include conf.d/yunohost_panel.conf.inc;
}

# SPA fallback — any path under __PATH__/ that didn't resolve to a file
# above gets index.html so React Router can take over client-side.
location @__APP___spa {
    alias __INSTALL_DIR__/frontend/dist/;
    try_files /index.html =404;
}
